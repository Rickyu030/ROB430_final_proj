# Single LIBERO-Spatial task after convert_libero_hdf5_for_dp.py (obs keys match DP).
# Convert example:
#   python DP/LIBERO/convert_libero_hdf5_for_dp.py -i .../task_demo.hdf5 \
#       -o DP/diffusion_policy/data/libero/spatial_one_dp_demo.hdf5
#
# Images are 128x128; policy uses crop_shape [76,76] in train_diffusion_unet_image workspace.

name: libero_spatial_one

shape_meta: &shape_meta
  obs:
    agentview_image:
      shape: [3, 128, 128]
      type: rgb
    robot0_eye_in_hand_image:
      shape: [3, 128, 128]
      type: rgb
    robot0_joint_qpos:
      shape: [7]
    robot0_gripper_qpos:
      shape: [2]
  action:
    shape: [7]

dataset_path: &dataset_path data/libero/spatial_one_dp_demo.hdf5
abs_action: &abs_action False

env_runner:
  _target_: diffusion_policy.env_runner.libero_dummy_image_runner.LiberoDummyImageRunner

dataset:
  _target_: diffusion_policy.dataset.robomimic_replay_image_dataset.RobomimicReplayImageDataset
  shape_meta: *shape_meta
  dataset_path: *dataset_path
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1+${n_latency_steps}'}
  pad_after: ${eval:'${n_action_steps}-1'}
  n_obs_steps: ${dataset_obs_steps}
  abs_action: *abs_action
  rotation_rep: 'rotation_6d'
  use_legacy_normalizer: False
  use_cache: true
  seed: 42
  val_ratio: 0.02
